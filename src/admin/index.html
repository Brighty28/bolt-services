<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolt Services - Content Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="cms-app">
    <header class="cms-header">
      <h1>Bolt Services CMS</h1>
      <p>Content Management System</p>
    </header>
    <nav class="cms-nav">
      <button class="cms-nav__btn active" data-section="hero">Hero</button>
      <button class="cms-nav__btn" data-section="about">About</button>
      <button class="cms-nav__btn" data-section="services">Services</button>
      <button class="cms-nav__btn" data-section="industries">Industries</button>
      <button class="cms-nav__btn" data-section="testimonials">Testimonials</button>
      <button class="cms-nav__btn" data-section="contact">Contact</button>
      <button class="cms-nav__btn" data-section="images">Images</button>
    </nav>
    <main class="cms-main" id="cms-main">
      <!-- Sections rendered by JS -->
    </main>
    <div class="cms-actions">
      <button class="cms-btn cms-btn--primary" id="save-btn">Save Changes</button>
      <span class="cms-status" id="save-status"></span>
    </div>
  </div>
  <script src="cms.js"></script>
</body>
</html>
